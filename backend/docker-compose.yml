services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travel_destinations_backend
    depends_on:
      - mariadb
    ports:
      - "5000:5000"  # Flask kører på port 5000
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=mysql+pymysql://root:password@mariadb:3306/travel_db
    command: python app.py

  mariadb:
    image: mariadb:10.6.20
    container_name: travel_destinations_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: travel_db
      MYSQL_USER: travel_user
      MYSQL_PASSWORD: travel_password
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3307:3306"  # 3307 på host for at undgå konflikt med lokal MySQL

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: travel_destinations_phpmyadmin
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: password
      UPLOAD_LIMIT: 100M
    ports:
      - "8080:80"

volumes:
  mariadb_data: