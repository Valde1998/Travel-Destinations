<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Destinations</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-container">
            <h1>Travel Destinations</h1>
            {% if logged_in %}
            <div id="user-info">
                <span id="username">{{ session.username }}</span>
                <button onclick="logout()" class="btn">Log ud</button>
            </div>
            {% else %}
            <div id="auth-buttons">
                <a href="{{ url_for('login_page') }}" class="btn">Log ind</a>
                <a href="{{ url_for('signup_page') }}" class="btn">Opret bruger</a>
            </div>
            {% endif %}
        </div>
    </nav>
    <main>
        <div class="container">
            <div class="header">
                <h2>Mine rejsedestinationer</h2>
                {% if logged_in %}
                <a href="{{ url_for('create_page') }}" class="btn btn-primary">+ Tilføj ny destination</a>
                {% endif %}
            </div>
            <div id="destinations-list" class="destinations-grid"></div>
        </div>
    </main>
    <script>
        window.loggedIn = {{ 'true' if logged_in else 'false' }};
    </script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/list.js') }}"></script>
</body>
</html>
